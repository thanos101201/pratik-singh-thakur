version: '3.8'

services:
  portfolio:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "8080:80"
    container_name: portfolio-app
    restart: unless-stopped

  portfolio-dev:
    build:
      context: .
      dockerfile: dockerfile.dev
    ports:
      - "5173:5173"
    container_name: portfolio-dev
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    profiles:
      - dev

